<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>탈퇴 완료</title>

<link rel="stylesheet" href="dark.css">

</head>

<body>

<header class="header">

<div class="logo">

🛒 Dark Shopping

</div>

</header>

<section class="recommend">

<div class="card" style="max-width:700px;margin:auto;padding:50px;text-align:center;">

<h1 style="color:#e63946;font-size:46px;">

회원 탈퇴 완료

</h1>

<br>

<p style="font-size:22px;">

회원 탈퇴가 정상적으로 처리되었습니다.

</p>

<br><br>

<div style="background:#f5f5f5;padding:25px;border-radius:12px;line-height:2;">

<h3>실험 결과</h3>

<br>

<p>

⏱ 총 소요시간

<strong id="timeResult">

00:00

</strong>

</p>

<p>

🖱 총 클릭수

<strong id="clickResult">

0회

</strong>

</p>

<p>

📄 마지막 방문 메뉴

<strong id="menuResult">

-

</strong>

</p>

</div>

<br><br>

<button

onclick="location.href='survey.html'"

style="width:100%;
height:60px;
background:#2563eb;
color:white;
font-size:22px;
border:none;
border-radius:10px;
cursor:pointer;">

설문조사 하기

</button>

</div>

</section>

<script>

let sec=parseInt(localStorage.getItem("playTime"))||0;

let click=parseInt(localStorage.getItem("clickCount"))||0;

let menu=localStorage.getItem("lastMenu")||"없음";

let m=Math.floor(sec/60);

let s=sec%60;

document.getElementById("timeResult").innerHTML=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

document.getElementById("clickResult").innerHTML=
click+"회";

document.getElementById("menuResult").innerHTML=
menu;

</script>

</body>

</html>
