<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>주문하기</title>

<link rel="stylesheet" href="dark.css">

</head>

<body>

<header class="header">

    <div class="logo">
        DarkShop
    </div>

    <div class="search-box">

        <input
        type="text"
        placeholder="상품 검색">

        <button>
            검색
        </button>

    </div>

    <nav>

        <button onclick="location.href='dark-home.html'">
            홈
        </button>

        <button>
            장바구니
        </button>

    </nav>

</header>

<section class="order-page">

<h1>

주문 / 결제

</h1>

<div class="order-container">

<!-- 왼쪽 -->

<div class="order-left">

<div class="cart-item">

<img
src="https://picsum.photos/220/180?20">

<div class="item-info">

<h2>

무선 이어폰

</h2>

<p>

AI 추천 상품

</p>

<p class="price">

59,900원

</p>

<div class="quantity">

<button>-</button>

<input
type="number"
value="1"
min="1">

<button>+</button>

</div>

</div>

</div>

<div class="cart-item">

<img
src="https://picsum.photos/220/180?21">

<div class="item-info">

<h2>

블루투스 스피커

</h2>

<p>

인기 상품

</p>

<p class="price">

79,000원

</p>

<div class="quantity">

<button>-</button>

<input
type="number"
value="1"
min="1">

<button>+</button>

</div>

</div>

</div>

</div>

<!-- 오른쪽 -->

<div class="order-right">

<h2>

주문 요약

</h2>

<hr>

<p>

상품 금액

<span>

138,900원

</span>

</p>

<p>

배송비

<span>

무료

</span>

</p>

<p>

쿠폰 할인

<span style="color:red;">

-15%

</span>

</p>

<hr>

<h2>

최종 결제 금액

</h2>

<h1 class="total-price">

118,065원

</h1>
<!-- 다크패턴 옵션 -->

<div class="option-box">

    <label>

        <input
        type="checkbox"
        checked>

        <strong>프리미엄 배송 (추천)</strong>

        <span class="option-price">

            +4,900원

        </span>

    </label>

    <p class="option-desc">

        가장 많은 고객이 선택한 배송 방법입니다.

    </p>

</div>

<div class="option-box">

    <label>

        <input
        type="checkbox"
        checked>

        마케팅 정보 수신에 동의합니다.

    </label>

    <p class="option-desc">

        할인 쿠폰과 이벤트를 가장 먼저 받아볼 수 있습니다.

    </p>

</div>

<div class="warning-box">

    🔥 현재 적용된 15% 할인 쿠폰은
    <strong>오늘까지만</strong> 사용할 수 있습니다.

</div>

<button
class="pay-button"
onclick="location.href='dark-finish.html'">

    지금 결제하기

</button>

<button
class="cancel-button"
onclick="location.href='dark-home.html'">

    계속 쇼핑하기

</button>

</div>

</div>

</section>

<footer>

<div>

DarkShop

</div>

<p>

© 2026 Dark Pattern Shopping Mall

</p>

</footer>

<script src="dark.js"></script>

</body>
</html>
