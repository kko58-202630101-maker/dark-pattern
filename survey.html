<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>사용성 설문조사</title>

<link rel="stylesheet" href="dark.css">

</head>

<body>

<header class="header">

<div class="logo">

🧪 Dark Pattern Lab

</div>

</header>

<section class="recommend">

<div class="card" style="max-width:800px;margin:auto;padding:50px;">

<h1 style="text-align:center;">

사용성 설문조사

</h1>

<br>

<p style="text-align:center;font-size:20px;">

실험에 참여해주셔서 감사합니다.

아래 질문에 응답해주세요.

</p>

<br><br>

<form id="surveyForm">

<h3>1. 회원 탈퇴를 찾기 쉬웠나요?</h3>

<select id="q1" required>

<option value="">선택</option>

<option>매우 쉬웠다</option>

<option>쉬웠다</option>

<option>보통이다</option>

<option>어려웠다</option>

<option>매우 어려웠다</option>

</select>

<br><br>

<h3>2. 사용 중 스트레스를 느꼈나요?</h3>

<select id="q2" required>

<option value="">선택</option>

<option>전혀 아니다</option>

<option>아니다</option>

<option>보통</option>

<option>그렇다</option>

<option>매우 그렇다</option>

</select>

<br><br>

<h3>3. 이 웹사이트를 다시 이용하고 싶나요?</h3>

<select id="q3" required>

<option value="">선택</option>

<option>매우 그렇다</option>

<option>그렇다</option>

<option>보통이다</option>

<option>아니다</option>

<option>전혀 아니다</option>

</select>

<br><br>

<h3>4. 회원 탈퇴 버튼을 찾는데 가장 어려웠던 이유는?</h3>

<textarea

id="q4"

rows="5"

style="width:100%;padding:15px;font-size:16px;"

placeholder="자유롭게 작성해주세요."></textarea>

<br><br>

<button

type="submit"

style="width:100%;
height:60px;
background:#2563eb;
color:white;
border:none;
font-size:22px;
border-radius:10px;">

결과 보기

</button>

</form>

</div>

</section>

<script>

document.getElementById("surveyForm").onsubmit=function(e){

e.preventDefault();

localStorage.setItem("q1",document.getElementById("q1").value);

localStorage.setItem("q2",document.getElementById("q2").value);

localStorage.setItem("q3",document.getElementById("q3").value);

localStorage.setItem("q4",document.getElementById("q4").value);

location.href="result.html";

}

</script>

</body>

</html>
