<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>회원 탈퇴</title>

<link rel="stylesheet" href="good.css">

</head>

<body>

<header class="header">

<div class="logo">

GoodShop

</div>

<nav>

<button onclick="location.href='good-home.html'">

홈

</button>

<button onclick="location.href='good-mypage.html'">

마이페이지

</button>

</nav>

</header>

<section class="withdraw-page">

<h1>

회원 탈퇴

</h1>

<p class="withdraw-text">

회원 탈퇴 시 아래 정보가 삭제됩니다.

</p>

<div class="guide-box">

<p>• 회원정보</p>

<p>• 보유 적립금</p>

<p>• 쿠폰</p>

<p>• 관심상품 목록</p>

<p>• 주문 관련 일부 정보는 관련 법령에 따라 일정 기간 보관될 수 있습니다.</p>

</div>

<h2 style="margin-top:40px;">

(선택) 탈퇴 이유를 알려주시면 서비스 개선에 도움이 됩니다.

</h2>

<textarea
class="withdraw-reason"
placeholder="입력하지 않아도 회원탈퇴가 가능합니다."></textarea>

<div class="withdraw-buttons">

<button
class="cancel-good"
onclick="location.href='good-mypage.html'">

취소

</button>

<button
class="confirm-good"
onclick="location.href='good-finish.html'">

회원 탈퇴

</button>

</div>

</section>

<footer>

<div>

GoodShop

</div>

<p>

</p>
