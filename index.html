<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Shopping</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        🛒 Dark Shopping
    </div>

    <nav>
        <a href="#">홈</a>
        <a href="#">이벤트</a>
        <a href="#">고객센터</a>
    </nav>

</header>

<section class="banner">

    <h1>🎉 오늘 가입하면 90% 할인!</h1>

    <p>
        지금 가입하지 않으면 혜택이 종료될 수 있습니다.
    </p>

</section>

<div class="container">

    <div class="left">

        <h2>회원가입</h2>

        <form id="signupForm">

            <label>이름</label>

            <input
            type="text"
            placeholder="이름 입력"
            required>

            <label>이메일</label>

            <input
            type="email"
            placeholder="example@email.com"
            required>

            <label>비밀번호</label>

            <input
            type="password"
            placeholder="********"
            required>

            <div class="check">

                <input
                type="checkbox"
                checked
                id="agree1">

                <label for="agree1">
                    (필수) 개인정보 이용 동의
                </label>

            </div>

            <div class="check">

                <input
                type="checkbox"
                checked
                id="agree2">

                <label for="agree2">
                    (선택) 광고 수신 동의
                </label>

            </div>

            <div class="check">

                <input
                type="checkbox"
                checked
                id="agree3">

                <label for="agree3">
                    (선택) 제3자 정보 제공
                </label>

            </div>

            <div class="coupon">

                🔥 남은 쿠폰
                <span id="couponCount">3</span>장

            </div>

            <button
            class="joinBtn"
            type="submit">

                가입하고 할인받기

            </button>

            <button
            class="cancelBtn"
            type="button">

                나중에 하기

            </button>

        </form>

    </div>

    <div class="right">

        <h2>실시간 가입</h2>

        <ul id="memberList">

            <li>김○○님 가입 완료</li>
            <li>이○○님 가입 완료</li>
            <li>박○○님 가입 완료</li>
            <li>최○○님 가입 완료</li>
            <li>정○○님 가입 완료</li>

        </ul>

    </div>

</div>

<div id="popup">

    <div class="popupBox">

        <h2>잠깐!</h2>

        <p>

            지금 나가면 할인 쿠폰을 받을 수 없습니다.<br><br>

            정말 나가시겠습니까?

        </p>

        <button id="stay">

            가입 계속하기

        </button>

        <button id="leave">

            나가기

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
